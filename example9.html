<html>

<head>
    <title>HTML Table</title>
    <style>
        table,th,td{
            border: 1px solid black;
            border-collapse: collapse;
        }
        th,td{
            padding: 10px;
        }
    </style>

</head>

    <body>
        <table style="width: 100%;">
            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>City</th>
            </tr>

            <tr>
                <td>Oshada</td>
                <td>29</td>
                <td>Dambulla</td>
            </tr>

            <tr>
                <td>Nirmal</td>
                <td>18</td>
                <td>Galewela</td>
            </tr>

            <tr>
                <td>Nipunika</td>
                <td>22</td>
                <td rowspan="3">Dambulla</td>
            </tr>

            <tr>
                <td>Nanduli</td>
                <td>19</td>

            </tr>
            
            <tr>
                <td>Shanika</td>
                <td>20</td>

            </tr>
        </table>

    </body>
</html>
